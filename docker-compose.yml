services:
  postgres:
    image: postgres:16-alpine
    container_name: ia_npa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: npa_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d npa_analysis"]
      interval: 5s
      timeout: 5s
      retries: 10

  retrieval:
    build:
      context: .
      dockerfile: Dockerfile
      target: retrieval
    container_name: ia_npa_retrieval
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      RETRIEVAL_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:8001,http://127.0.0.1:8001"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - retrieval_cache:/app/scripts/data/cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: ia_npa_backend
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      BACKEND_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/npa_analysis"
      RETRIEVAL_SERVICE_URL: "http://retrieval:8000"
      BACKEND_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    depends_on:
      postgres:
        condition: service_healthy
      retrieval:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - backend_documents:/app/backend/storage/documents
      - backend_model_cache:/app/backend/storage/model_cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  retrieval_cache:
  backend_documents:
  backend_model_cache:
